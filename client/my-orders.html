<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders — Easy Basket</title>
    <meta name="description" content="View all your past and present orders on Easy Basket.">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/shopping.css">
    <link rel="stylesheet" href="./css/category-products.css">
    <link rel="stylesheet" href="./css/cart.css">
    <link rel="stylesheet" href="./css/orders.css">
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar">
        <a href="shopping.html" class="nav-logo">🛒 Easy Basket</a>
        <div class="nav-actions">
            <span class="nav-greeting" id="userGreeting">Hello 👋</span>
            <a href="my-orders.html" class="orders-nav-btn" title="My Orders">📋 My Orders</a>
            <a href="cart.html" class="cart-nav-btn" title="View Cart">
                🛒 Cart
                <span class="cart-badge" id="cartBadge"></span>
            </a>
            <button class="btn btn-outline" id="logoutBtn">Logout</button>
        </div>
    </nav>

    <!-- BREADCRUMB -->
    <div class="breadcrumb">
        <a href="shopping.html">🏠 Home</a>
        <span class="bc-sep">›</span>
        <span class="bc-active">My Orders</span>
    </div>

    <!-- MAIN -->
    <main class="orders-main" id="ordersMain">

        <!-- Skeleton -->
        <div id="skeletonList">
            <h2 class="orders-heading">📋 My Orders</h2>
            <div class="order-skeleton"></div>
            <div class="order-skeleton"></div>
            <div class="order-skeleton"></div>
        </div>

        <!-- Orders list (populated by JS) -->
        <div id="ordersList" style="display:none;"></div>

        <!-- Empty state -->
        <div class="orders-empty" id="emptyState" style="display:none;">
            <span class="empty-emoji">📋</span>
            <h2>No orders yet</h2>
            <p>You haven't placed any orders. Start shopping!</p>
            <a href="shopping.html">Browse Products →</a>
        </div>

    </main>

    <!-- FOOTER -->
    <footer class="footer">
        <div class="footer-logo">🛒 Easy Basket</div>
        <p class="footer-copy">© 2026 Easy Basket. Fresh, fast, and local.</p>
    </footer>

    <script src="./js/api.js"></script>
    <script src="./js/my-orders.js"></script>
</body>

</html>
